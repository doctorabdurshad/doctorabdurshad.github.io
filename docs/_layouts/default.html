<!DOCTYPE html>
<html lang="en">
  {% include head.html %}
  <body>

    {{ content }}

    <!-- Footer -->
    <footer role="contentinfo" class="bg-dark text-white text-center py-3">
      <div class="container">
        <p class="mb-1">&copy; <span id="year"></span> Abdur R. Shad, MD-MPH</p>
      </div>
    </footer>

    <script>
      const yearEl = document.querySelector("#year");
      if (yearEl) {
        yearEl.textContent = new Date().getFullYear();
      }
    </script>

    <script src="{{ '/js/site.js' | prepend: site.baseurl | prepend: site.url }}"></script>
  </body>
</html>
